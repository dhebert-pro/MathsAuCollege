<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Présentation d’un cours de mathématiques." />
    <meta name="referrer" content="no-referrer" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://apis.google.com; style-src 'self'; img-src 'self' data:; connect-src 'self' https://*.googleapis.com https://*.firebaseio.com wss://*.firebaseio.com https://*.firebaseapp.com; frame-src https://*.firebaseapp.com https://accounts.google.com; object-src 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests" />
    <link rel="icon" href="assets/logo.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="presentation.css?v=0.8.0" />
    <title>Présentation · Maths au collège</title>
  </head>
  <body>
    <main id="presentation-app" class="presentation-app" aria-live="polite">
      <section id="presentation-loading" class="presentation-message">
        <h1>Préparation du cours…</h1>
      </section>
      <section id="presentation-error" class="presentation-message" hidden>
        <h1>Cours indisponible</h1>
        <p id="presentation-error-message">Ce cours ne peut pas être affiché.</p>
        <a href="index.html">Retour aux cours</a>
      </section>
      <section id="presentation-stage" class="presentation-stage" hidden>
        <header class="presentation-topbar">
          <div><span id="presentation-level"></span><span class="presentation-version">v0.8.0</span></div>
          <div class="presentation-tools">
            <button id="teacher-links-toggle" type="button" title="Ouvrir les liens privés (raccourci L)" hidden>Liens du professeur <span id="teacher-link-count">0</span></button>
            <button id="presentation-pdf" type="button">PDF</button>
            <button id="fullscreen-button" type="button">Plein écran</button>
            <a id="presentation-close" href="index.html" aria-label="Quitter la présentation">×</a>
          </div>
        </header>
        <div class="slide-shell">
          <article id="slide" class="slide"></article>
        </div>
        <aside id="teacher-links" class="teacher-links" hidden></aside>
        <footer class="presentation-controls">
          <button id="previous-step" type="button" aria-label="Précédent">←</button>
          <div class="presentation-progress"><span id="slide-counter"></span><div><i id="progress-bar"></i></div><small id="reveal-hint">Cliquez pour continuer</small></div>
          <button id="next-step" type="button" aria-label="Suivant">→</button>
        </footer>
      </section>
    </main>

    <script src="vendor/jspdf.umd.min.js?v=0.8.0" defer></script>
    <script src="course-content.js?v=0.8.0" defer></script>
    <script src="firebase-config.js?v=0.8.0" defer></script>
    <script src="firebase-bundle.js?v=0.8.0" defer></script>
    <script src="course-store.js?v=0.8.0" defer></script>
    <script src="pdf-export.js?v=0.8.0" defer></script>
    <script src="presentation.js?v=0.8.0" defer></script>
  </body>
</html>
