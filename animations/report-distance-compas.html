<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Reporter une distance au compas</title>
    <link rel="stylesheet" href="report-distance-compas.css?v=0.19.0" />
    <script src="report-distance-compas.js?v=0.19.0" defer></script>
  </head>
  <body>
    <main class="animation-shell">
      <header>
        <p class="eyebrow">Méthode</p>
        <h1>Reporter une distance au compas</h1>
      </header>

      <section class="stage" aria-label="Animation du report de la longueur AB à partir du point C">
        <svg viewBox="0 0 1000 610" role="img" aria-labelledby="animation-title animation-description">
          <title id="animation-title">Report de la longueur AB sur une demi-droite d’origine C</title>
          <desc id="animation-description">Le compas prend la longueur AB, se déplace sans changer d’ouverture, puis trace un arc qui place le point D tel que CD est égal à AB.</desc>
          <defs>
            <marker id="arrowhead" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
              <path d="M0,0 L10,4 L0,8 Z" fill="currentColor" />
            </marker>
            <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
              <feDropShadow dx="0" dy="5" stdDeviation="6" flood-color="#102f43" flood-opacity=".18" />
            </filter>
          </defs>

          <g class="source-figure">
            <text x="110" y="78" class="figure-label">Distance à reporter</text>
            <line x1="170" y1="150" x2="390" y2="150" class="geometry-line source-line" />
            <circle cx="170" cy="150" r="6" class="point" />
            <circle cx="390" cy="150" r="6" class="point" />
            <text x="152" y="188" class="point-label">A</text>
            <text x="382" y="188" class="point-label">B</text>
            <path d="M170 116 V126 M170 121 H390 M390 116 V126" class="measure-mark" />
            <text x="280" y="108" class="length-label" text-anchor="middle">AB</text>
          </g>

          <g class="target-figure">
            <line x1="170" y1="440" x2="850" y2="440" class="geometry-line target-line" marker-end="url(#arrowhead)" />
            <circle cx="170" cy="440" r="6" class="point" />
            <text x="152" y="480" class="point-label">C</text>
            <circle id="point-d" cx="390" cy="440" r="7" class="point result-point" />
            <text id="label-d" x="382" y="480" class="point-label result-label">D</text>
            <path id="compass-arc" d="M333.49 292.78 A220 220 0 0 1 390 440" class="compass-arc" pathLength="100" />
          </g>

          <g id="compass-motion" class="compass" filter="url(#shadow)">
            <line x1="280" y1="62" x2="170" y2="150" class="compass-leg compass-leg-left" />
            <line x1="280" y1="62" x2="390" y2="150" class="compass-leg compass-leg-right" />
            <line x1="170" y1="146" x2="166" y2="166" class="compass-needle" />
            <path d="M386 143 L394 151 L390 166 Z" class="compass-pencil" />
            <circle cx="280" cy="62" r="18" class="compass-hinge" />
            <circle cx="280" cy="62" r="6" class="compass-screw" />
            <path d="M257 84 Q280 101 303 84" class="compass-brace" />
          </g>

          <g id="result-equality" class="result-equality">
            <rect x="615" y="500" width="270" height="72" rx="20" />
            <text x="750" y="547" text-anchor="middle">CD = AB</text>
          </g>
        </svg>
      </section>

      <section class="explanation" aria-live="polite">
        <p id="step-number">Étape 1 sur 4</p>
        <strong id="step-caption">On règle l’écartement du compas sur la longueur AB.</strong>
      </section>

      <nav class="controls" aria-label="Commandes de l’animation">
        <button type="button" id="previous-step">Étape précédente</button>
        <button type="button" id="play-pause" class="primary">Pause</button>
        <button type="button" id="next-step">Étape suivante</button>
        <button type="button" id="restart">Recommencer</button>
        <label class="timeline">Progression<input id="progress" type="range" min="0" max="1000" value="0" /></label>
      </nav>
    </main>
  </body>
</html>
